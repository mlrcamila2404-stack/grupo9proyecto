<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practfy - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-shell">
 
   <div class="wordmark"><span class="w-blue">Pract</span><span class="w-purple">ify</span></div>
 
      <div class="pitch">
        <h1>Vuelve a <br> prácticar.</h1>
        <p>Listening, Reading y más exámenes tipo test, listos cuando tú quieras.</p>
      </div>

    <div class="auth-form-panel">
      <h2>Iniciar sesión</h2>
      <p class="subtitle">Ingresa tus datos para continuar practicando.</p>
 
      <form>
        <div class="field">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Tu usuario" autocomplete="username" required>
        </div>
 
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Tu contraseña" autocomplete="current-password" required>
        </div>
 
        <button type="submit" class="btn-practfy">Entrar</button>
 
        <div class="switch-link">
          ¿No tienes cuenta? <a href="registro.html">Registrarme</a>
        </div>
      </form>
    </div>
 
  </div>
</body>
</html>
