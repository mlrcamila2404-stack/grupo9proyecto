<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practify - Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/perfil.css" rel="stylesheet">
</head>
<body>
 
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand wordmark-nav" href="index.html"><span class="w-blue">Pract</span><span class="w-purple">ify</span></a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="examenes.html">Exámenes</a></li>
          <li class="nav-item"><a class="nav-link" href="resultados.html">Resultados</a></li>
          <li class="nav-item"><a class="nav-link" href="progreso.html">Progreso</a></li>
          <li class="nav-item"><a class="nav-link active" href="perfil.html">Perfil</a></li>
        </ul>
      </div>
    </div>
  </nav>
 
  <div class="container page-header pb-5">
 
    <!-- Encabezado de perfil -->
    <div class="panel mb-4 d-flex flex-wrap align-items-center gap-3 justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <div class="avatar-circle">JD</div>
        <div>
          <h4 class="mb-0 fw-bold">Juan Díaz</h4>
          <div class="text-muted small">@juandiaz &middot; juan.diaz@correo.com</div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn-practfy" type="button" data-bs-toggle="collapse" data-bs-target="#editProfileForm" aria-expanded="false" aria-controls="editProfileForm">Editar perfil</button>
        <button class="btn-outline-practfy" type="button">Cerrar sesión</button>
      </div>
    </div>
 
    <!-- Estadísticas rápidas -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="value">18</div>
          <div class="label">Exámenes completados</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="value">76%</div>
          <div class="label">Promedio general</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="value">5</div>
          <div class="label">Días de racha</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="value">32</div>
          <div class="label">Horas practicadas</div>
        </div>
      </div>
    </div>
 
    
    <div class="collapse" id="editProfileForm">
      <div class="panel">
        <h5 class="fw-bold mb-3">Editar perfil</h5>
        <form>
          <div class="row g-3">
            <div class="col-md-6 field">
              <label for="nombre">Nombre completo</label>
              <input type="text" id="nombre" class="form-control" value="Juan Díaz">
            </div>
            <div class="col-md-6 field">
              <label for="usuario">Usuario</label>
              <input type="text" id="usuario" class="form-control" value="juandiaz">
            </div>
            <div class="col-md-6 field">
              <label for="email">Correo electrónico</label>
              <input type="email" id="email" class="form-control" value="juan.diaz@correo.com">
            </div>
            <div class="col-md-6 field">
              <label for="password">Nueva contraseña</label>
              <input type="password" id="password" class="form-control" placeholder="Dejar en blanco para no cambiar">
            </div>
          </div>
          <button type="submit" class="btn-practfy mt-4">Guardar cambios</button>
        </form>
      </div>
    </div>
 
  </div>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 
</body>
</html>
