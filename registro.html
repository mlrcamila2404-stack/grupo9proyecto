
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practfy - Registro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-shell">
 
   <div class="wordmark"><span class="w-blue">Pract</span><span class="w-purple">ify</span></div>

      <div class="pitch">
        <p>Crea tu cuenta gratis y accede a exámenes de Listening, Reading y más.</p>
      </div>
 
    <div class="auth-form-panel">
      <h2>Registrarse</h2>
 
      <form>
        <div class="field">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Tu nombre completo" autocomplete="name" required>
        </div>
 
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="tucorreo@ejemplo.com" autocomplete="email" required>
        </div>
 
        <div class="field">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Elige un usuario" autocomplete="username" required>
        </div>
 
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Crea una contraseña" autocomplete="new-password" required>
        </div>
 
        <div class="field">
          <label for="password2">Confirmar contraseña</label>
          <input type="password" id="password2" name="password2" class="form-control" placeholder="Repite tu contraseña" autocomplete="new-password" required>
        </div>
 
        <button type="submit" class="btn-practfy"><a href="examenes.html">Crear cuenta</a></button>
 
        <div class="switch-link">
          ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
        </div>
      </form>
    </div>
 
  </div>
</body>
</html>
