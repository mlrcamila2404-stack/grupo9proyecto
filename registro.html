<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practfy - Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 22rem;">
    <h2 class="text-center mb-4">Registrarse</h2>
    <form>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Nombre Completo" required>
      </div>
      <div class="mb-3">
        <input type="email" class="form-control" placeholder="Correo Electrónico" required>
      </div>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Usuario" required>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" placeholder="Contraseña" required>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" placeholder="Confirmar Contraseña" required>
      </div>
      <button type="submit" class="btn btn-practfy w-100">Crear Cuenta</button>
      <div class="text-center mt-3">
        ¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a>
      </div>
    </form>
  </div>
</body>
</html>
