<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practify - Mi Progreso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/progreso.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="home.html">Practify</a>
       <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="examenes.html">Exámenes</a></li>
          <li class="nav-item"><a class="nav-link" href="resultados.html">Resultados</a></li>
          <li class="nav-item"><a class="nav-link" href="progreso.html">Progreso</a></li>
       </ul>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="fw-bold mb-4">Mi Progreso</h2>
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="stat-card p-4">
          <small class="text-muted">Listening</small>
          <h3 class="text-primary">100%</h3>
          <div class="progress"><div class="progress-bar bg-primary" style="width:100%"></div></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card p-4">
          <small class="text-muted">Reading</small>
          <h3 class="text-purple">0%</h3>
          <div class="progress"><div class="progress-bar bg-purple" style="width:0%"></div></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card p-4">
          <small class="text-muted">Éxito general</small>
          <h3 class="text-success">0%</h3>
          <div class="progress"><div class="progress-bar bg-success" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <div class="stat-card p-4">
      <h5 class="mb-3">Historial reciente</h5>
      <table class="table align-middle mb-0">
        <thead>
          <tr><th>Examen</th><th>Fecha</th><th>Resultado</th></tr>
        </thead>
        <tbody>
          <tr><td>Listening 1</td><td>12/06/2024</td><td><span class="badge bg-success">100%</span></td></tr>
          <tr><td>Reading 1</td><td>10/06/2024</td><td><span class="badge bg-warning text-dark">0%</span></td></tr>
          <tr><td>Full Practify</td><td>08/06/2024</td><td><span class="badge bg-success">0%</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="text-center py-4">
    <a href="examenes.html" class="btn btn-primary rounded-pill">Volver a Exámenes</a>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
