<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practify - Retroalimentación</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/retroalimentacion.css">
</head>
<body>
 
  <div class="bg-shape s1"></div>
  <div class="bg-shape s2"></div>
 
  <div class="feedback-wrap">
 
    <div class="wordmark-nav" style="text-align:center; margin-bottom: 24px;">
      <span class="w-prac">Prac</span><span class="w-tify">tify</span>
    </div>
 
    <div class="screen-title">¡Buen trabajo!</div>
    <div class="screen-sub">Vas por buen camino, sigue así.</div>
 
    <div class="result-card">
      <div class="circle-progress" style="background: conic-gradient(#3A86EF 0% 68%, #EEF0FB 68% 100%);">
        <div class="inner">
          <div class="score" style="color:#3A86EF;">68%</div>
          <div class="score-label">Puntaje</div>
        </div>
      </div>
 
      <span class="badge-level" style="background: rgba(58,134,239,0.15); color:#2C5FB0;">👍 Buen desempeño</span>
 
      <div class="stats-grid">
        <div class="stat correct">
          <div class="num">14</div>
          <div class="label">Correctas</div>
        </div>
        <div class="stat wrong">
          <div class="num">6</div>
          <div class="label">Incorrectas</div>
        </div>
        <div class="stat">
          <div class="num">15:10</div>
          <div class="label">Tiempo</div>
        </div>
      </div>
    </div>
 
    <div class="feedback-box">
      <h6>Retroalimentación</h6>
      <div class="feedback-item"><span class="icon">✅</span><span>Buena comprensión de ideas principales.</span></div>
      <div class="feedback-item"><span class="icon">⚠️</span><span>Repasa preguntas de inferencia.</span></div>
      <div class="feedback-item"><span class="icon">⚠️</span><span>Refuerza el vocabulario en contexto.</span></div>
    </div>
 
    <div class="actions">
      
      <a href="examenes.html" class="btn-fill-style">Continuar</a>
    </div>
 
  </div>
 
</body>
</html>
